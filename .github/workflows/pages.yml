name: Deploy Duckku Birds to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static bundle
        run: |
          mkdir -p .pages-build
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'output' \
            --exclude '*.log' \
            ./ .pages-build/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages-build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
